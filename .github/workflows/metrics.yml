name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # Убирает шапку с ФИО, аватаром и прочей базовой статистикой
          base: ""

          # Оставляет только красивую карту активности
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
